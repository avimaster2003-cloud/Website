services:
  - type: web
    name: apex-stripe-backend
    env: node
    rootDir: stripe-backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://usevetra.com
      - key: FRONTEND_URLS
        value: https://usevetra.com,https://www.usevetra.com
      - key: ADMIN_API_KEY
        sync: false
      - key: CONTRACT_WEBHOOK_URL
        value: https://api.usevetra.com/webhook/vetra-contract-intake
      - key: CONTRACT_WEBHOOK_SECRET
        sync: false
      - key: LEGAL_EMAIL_TO
        value: legal@usevetra.com
      - key: LEGAL_EMAIL_CC
        value: ""
      - key: CONTRACT_EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: STRIPE_PRICE_ID_3M_MONTHLY
        value: price_1TE55SROIh3dM2m7rZkAIC9r
      - key: STRIPE_PRICE_ID_12M_MONTHLY
        value: price_1TE55VROIh3dM2m7uesBBzRC
