<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Vetra...</title>
  <meta http-equiv="refresh" content="4;url=https://usevetra.com/start/?utm_source=qr&utm_medium=offline&utm_campaign=business_card&utm_content=founder_card" />

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S7NV78PHSK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S7NV78PHSK');
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f10;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      text-align: center;
      max-width: 420px;
      padding: 24px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title">Opening Vetra</div>
    <div class="sub">Thanks for scanning. Redirecting now...</div>
  </main>

  <script>
    (function() {
      var redirectUrl = "https://usevetra.com/start/?utm_source=qr&utm_medium=offline&utm_campaign=business_card&utm_content=founder_card";

      // Fire GA4 QR scan event, then redirect
      function doRedirect() {
        window.location.replace(redirectUrl);
      }

      if (typeof gtag === 'function') {
        gtag('event', 'qr_scan', {
          event_category: 'offline',
          event_label: 'founder_card',
          campaign: 'business_card'
        });
        // Give GA4 ~800ms to send the event before navigating
        setTimeout(doRedirect, 800);
      } else {
        doRedirect();
      }
    })();
  </script>
</body>
</html>
