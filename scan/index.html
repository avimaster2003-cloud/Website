<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Vetra...</title>
  <meta http-equiv="refresh" content="3;url=https://usevetra.com/start/?utm_source=qr&utm_medium=offline&utm_campaign=business_card&utm_content=founder_card" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f10;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      text-align: center;
      max-width: 420px;
      padding: 24px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title">Opening Vetra</div>
    <div class="sub">Thanks for scanning. Redirecting now...</div>
  </main>

  <script>
    (function() {
      var redirectUrl = "https://usevetra.com/start/?utm_source=qr&utm_medium=offline&utm_campaign=business_card&utm_content=founder_card";
      var counterHitUrl = "https://api.countapi.xyz/hit/usevetra/qr-card-main";

      // Fire-and-forget scan counter, then continue to destination.
      fetch(counterHitUrl, { method: "GET", mode: "cors", cache: "no-store" })
        .catch(function() {})
        .finally(function() {
          window.location.replace(redirectUrl);
        });
    })();
  </script>
</body>
</html>
