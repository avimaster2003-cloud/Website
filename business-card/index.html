<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetra Business Card - Avi Patel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@600;700&display=swap');

        :root {
            --card-width: 85.5mm;
            --card-height: 54mm;
            --preview-scale: 2.35;
            --dark-bg: #0a0a0b;
            --matte-black: #131314;
            --matte-gray: #1a1a1c;
            --accent-purple: #8f5dff;
            --accent-blue: #4f8bff;
            --accent-cyan: #3eb8ff;
            --cool-ice: #d5d8df;
            --soft-white: #ecf3ff;
            --front-gradient: linear-gradient(135deg, #8f5dff 0%, #4f8bff 50%, #3eb8ff 100%);
            --back-gradient: linear-gradient(94deg, #8f5dff 8%, #4f8bff 52%, #3eb8ff 95%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at 18% 18%, rgba(82, 167, 255, 0.28), transparent 40%),
                radial-gradient(circle at 85% 82%, rgba(40, 246, 215, 0.2), transparent 36%),
                linear-gradient(120deg, #09111a 0%, #111928 60%, #0a1119 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin: 0 auto;
        }

        .card {
            width: calc(var(--card-width) * var(--preview-scale));
            height: calc(var(--card-height) * var(--preview-scale));
            border-radius: 16px;
            box-shadow: 0 22px 64px rgba(0, 0, 0, 0.55);
            position: relative;
            overflow: hidden;
            color: var(--soft-white);
            font-size: calc(2.85mm * var(--preview-scale));
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(4.8mm * var(--preview-scale)) calc(5.2mm * var(--preview-scale));
            page-break-after: always;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 82% 7%, rgba(255, 255, 255, 0.07), transparent 45%),
                radial-gradient(circle at 5% 92%, rgba(255, 255, 255, 0.04), transparent 40%);
            pointer-events: none;
        }

        /* Front of card */
        .card-front {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--matte-black) 55%, var(--matte-gray) 100%);
            position: relative;
            padding-top: calc(14.8mm * var(--preview-scale));
        }

        .card-front::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 38%;
            height: 100%;
            background: var(--front-gradient);
            opacity: 0.08;
            pointer-events: none;
        }

        .logo-section {
            display: flex;
            align-items: center;
            position: absolute;
            top: calc(0mm * var(--preview-scale));
            left: calc(3mm * var(--preview-scale));
            z-index: 0;
        }

        .logo {
            height: calc(24mm * var(--preview-scale));
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
        }

        .hero-copy {
            font-family: 'Sora', sans-serif;
            margin-top: calc(5.8mm * var(--preview-scale));
            margin-bottom: calc(0.6mm * var(--preview-scale));
            max-width: 90%;
            position: relative;
            z-index: 1;
        }

        .hero-headline {
            font-size: calc(2.8mm * var(--preview-scale));
            font-weight: 800;
            line-height: 1.2;
            color: #ffffff;
            margin-bottom: calc(0.8mm * var(--preview-scale));
            letter-spacing: -0.02em;
        }

        .hero-subline {
            font-size: calc(1.85mm * var(--preview-scale));
            font-weight: 500;
            color: #cbd3e0;
            line-height: 1.3;
        }

        .proof-badge {
            display: inline-block;
            font-size: calc(1.5mm * var(--preview-scale));
            font-weight: 700;
            color: var(--accent-cyan);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: calc(1mm * var(--preview-scale));
            border: calc(0.22mm * var(--preview-scale)) solid rgba(62, 184, 255, 0.45);
            border-radius: calc(0.8mm * var(--preview-scale));
            padding: calc(0.5mm * var(--preview-scale)) calc(1mm * var(--preview-scale));
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: calc(0.65mm * var(--preview-scale));
            border-top: calc(0.5mm * var(--preview-scale)) solid rgba(230, 234, 242, 0.32);
            padding-top: calc(2.2mm * var(--preview-scale));
            position: relative;
            z-index: 1;
            font-family: 'Sora', sans-serif;
            width: calc(38mm * var(--preview-scale));
            max-width: 100%;
        }

        .identity-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: calc(1.2mm * var(--preview-scale));
            margin-bottom: calc(0.4mm * var(--preview-scale));
        }

        .identity-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: calc(0.3mm * var(--preview-scale));
        }

        .name {
            font-family: 'Manrope', sans-serif;
            font-size: calc(3.1mm * var(--preview-scale));
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--cool-ice);
        }

        .title {
            font-size: calc(1.5mm * var(--preview-scale));
            color: #c7cfdd;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0;
        }

        .contact-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: calc(0.75mm * var(--preview-scale));
            width: 100%;
        }

        .contact-line {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: calc(0.9mm * var(--preview-scale));
            font-size: calc(1.55mm * var(--preview-scale));
            color: #dce4f3;
            line-height: 1.25;
            letter-spacing: 0.01em;
            min-height: calc(3.6mm * var(--preview-scale));
        }

        .contact-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: calc(1.2mm * var(--preview-scale));
            line-height: 1;
            color: #eef6ff;
            flex-shrink: 0;
        }

        .contact-line.placeholder {
            color: #98a7be;
        }

        .contact-line.placeholder .contact-icon {
            opacity: 0.75;
        }

        .contact-key {
            color: #92a0b6;
            font-size: calc(1.02mm * var(--preview-scale));
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .contact-val {
            font-weight: 600;
            color: #f3f7ff;
            white-space: nowrap;
            margin-left: 0;
        }

        .website,
        .contact-val.website {
            color: #f4f6f9;
            font-weight: 600;
        }

        /* Back of card */
        .card-back {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--matte-black) 58%, var(--matte-gray) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-back::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--back-gradient);
            pointer-events: none;
        }

        .qr-code-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: calc(1mm * var(--preview-scale));
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        .back-cta {
            font-family: 'Sora', sans-serif;
            font-size: calc(2.8mm * var(--preview-scale));
            text-align: center;
            max-width: 98%;
            line-height: 1.02;
            font-weight: 800;
            background: var(--back-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-fill-color: transparent;
            text-wrap: balance;
            margin-bottom: calc(0.25mm * var(--preview-scale));
            letter-spacing: -0.02em;
            white-space: nowrap;
        }

        .back-subtext {
            font-family: 'Sora', sans-serif;
            font-size: calc(2.35mm * var(--preview-scale));
            text-align: center;
            max-width: 98%;
            color: #c7cedb;
            line-height: 1.06;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .qr-code {
            width: calc(23.5mm * var(--preview-scale));
            height: calc(23.5mm * var(--preview-scale));
            padding: calc(1.4mm * var(--preview-scale));
            background: white;
            border-radius: calc(0.8mm * var(--preview-scale));
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.45);
            image-rendering: pixelated;
        }

        .qr-label {
            font-size: calc(1.6mm * var(--preview-scale));
            color: #9ba3ad;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .vetra-branding {
            position: absolute;
            bottom: calc(1mm * var(--preview-scale));
            right: calc(2.9mm * var(--preview-scale));
            height: calc(16mm * var(--preview-scale));
            width: auto;
            object-fit: contain;
            opacity: 0.68;
        }

        /* Print styles for PDF generation */
        @page {
            size: 85.5mm 54mm;
            margin: 0;
        }

        @media print {
            :root {
                --preview-scale: 1;
            }

            body {
                background: white;
                padding: 0;
            }

            .card-container {
                display: block;
                gap: 0;
                max-width: 100%;
                margin: 0;
            }

            .card {
                width: var(--card-width);
                height: var(--card-height);
                page-break-inside: avoid;
                margin: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 4.2mm 4.4mm;
                overflow: visible;
            }
        }

        /* Responsive for screen viewing */
        @media (max-width: 1200px) {
            :root {
                --preview-scale: 1.95;
            }
        }

        @media (max-width: 900px) {
            :root {
                --preview-scale: 1.55;
            }

            .card-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            :root {
                --preview-scale: 1.15;
            }

            .card-container {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- FRONT OF CARD -->
        <div class="card card-front">
            <div class="logo-section">
                <img src="../assets/vetra-logo.png" alt="Vetra Logo" class="logo">
            </div>

            <div class="hero-copy">
                <div class="hero-headline">Turn Empty Bays Into Revenue</div>
                <div class="hero-subline">24/7 AI booking + zero-down equipment financing</div>
                <div class="proof-badge">Enterprise Partner</div>
            </div>

            <div class="contact-info">
                <div class="identity-row">
                    <div class="identity-stack">
                        <div class="name">AVI PATEL</div>
                        <div class="title">Founder</div>
                    </div>
                </div>
                <div class="contact-list">
                    <div class="contact-line">
                        <span class="contact-icon" aria-hidden="true">📧</span>
                        <span class="contact-val">avi@usevetra.com</span>
                    </div>
                    <div class="contact-line">
                        <span class="contact-icon" aria-hidden="true">📞</span>
                        <span class="contact-val">423-737-4490</span>
                    </div>
                    <div class="contact-line">
                        <span class="contact-icon" aria-hidden="true">🌐</span>
                        <span class="contact-val website">usevetra.com/start</span>
                    </div>
                    <div class="contact-line placeholder">
                        <span class="contact-icon" aria-hidden="true">➕</span>
                        <span class="contact-val">Coming Soon</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BACK OF CARD -->
        <div class="card card-back">
            <div class="qr-code-section">
                <div class="back-cta">See how our launch partners fill more bays in 30 days</div>
                <div class="back-subtext">Avg revenue impact: $30K+ annual revenue</div>
                <img src="./assets/qr-usevetra-home.png" alt="QR Code" class="qr-code">
                <div class="qr-label">Unlock Your Revenue</div>
            </div>
            <img src="../assets/vetra-logo.png" alt="Vetra Logo" class="vetra-branding">
        </div>
    </div>

    <script>
        // Instructions for printing and PDF generation
        console.log(`
        === VETRA BUSINESS CARD - PRINTING INSTRUCTIONS ===
        
        TO GENERATE PDF FOR PRINTING:
        
        Option 1: Browser Print Function (Recommended for simple PDF)
        - Press Ctrl+P (Windows) or Cmd+P (Mac)
        - Set margins to 0
        - Paper size: Custom (85.5mm x 54mm)
        - Select "Background graphics" in the print settings
        - Save as PDF
        
        Option 2: Using wkhtmltopdf (for CMYK support)
        - Install: brew install wkhtmltopdf (Mac) or apt-get install wkhtmltopdf (Linux)
        - Run: wkhtmltopdf --page-width 85.5mm --page-height 54mm --margin-top 0 --margin-bottom 0 --margin-left 0 --margin-right 0 index.html business-card.pdf
        
        SETUP INSTRUCTIONS:
        1. Copy VETRA.png from ~/Downloads/ to /Website/business-card/assets/ folder
        2. Adjust colors and text as needed
        3. Print on 85.5mm x 54mm cardstock for professional results
        
        CMYK CONVERSION:
        - For true CMYK printing, use a tool like ImageMagick or Ghostscript
        - Or convert the PDF to CMYK using Adobe Acrobat Pro
        - Command: convert business-card.pdf -colorspace CMYK business-card-cmyk.pdf
        `);
    </script>
</body>
</html>
