<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetra Business Card - Avi Patel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@600;700&display=swap');

        :root {
            --card-width: 85.5mm;
            --card-height: 54mm;
            --preview-scale: 2.35;
            --matte-black-a: #0b0f14;
            --matte-black-b: #121a24;
            --matte-black-c: #1c2431;
            --electric-cyan: #53d4ff;
            --cool-ice: #b6eeff;
            --soft-white: #ecf3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at 18% 18%, rgba(82, 167, 255, 0.28), transparent 40%),
                radial-gradient(circle at 85% 82%, rgba(40, 246, 215, 0.2), transparent 36%),
                linear-gradient(120deg, #09111a 0%, #111928 60%, #0a1119 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin: 0 auto;
        }

        .card {
            width: calc(var(--card-width) * var(--preview-scale));
            height: calc(var(--card-height) * var(--preview-scale));
            border-radius: 16px;
            box-shadow: 0 22px 64px rgba(0, 0, 0, 0.55);
            position: relative;
            overflow: hidden;
            color: var(--soft-white);
            font-size: calc(2.85mm * var(--preview-scale));
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(4.8mm * var(--preview-scale)) calc(5.2mm * var(--preview-scale));
            page-break-after: always;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 80% 5%, rgba(84, 212, 255, 0.22), transparent 45%),
                radial-gradient(circle at 5% 92%, rgba(77, 255, 228, 0.18), transparent 40%);
            pointer-events: none;
        }

        /* Front of card */
        .card-front {
            background: linear-gradient(125deg, var(--matte-black-a) 0%, var(--matte-black-b) 55%, var(--matte-black-c) 100%);
        }

        .logo-section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            margin-bottom: calc(2.8mm * var(--preview-scale));
        }

        .logo {
            height: calc(9.2mm * var(--preview-scale));
            width: auto;
            object-fit: contain;
        }

        .guarantee-copy {
            font-family: 'Sora', sans-serif;
            font-size: calc(2.2mm * var(--preview-scale));
            letter-spacing: 0.02em;
            margin-bottom: calc(2.8mm * var(--preview-scale));
            max-width: 92%;
            line-height: 1.35;
            color: #d8e6ff;
        }

        .gradient-words {
            display: block;
            margin-top: calc(0.9mm * var(--preview-scale));
            font-weight: 700;
            background: linear-gradient(92deg, #66ecff 5%, #8dbdff 48%, #8dfff5 95%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-fill-color: transparent;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: calc(1.2mm * var(--preview-scale));
            border-top: calc(0.5mm * var(--preview-scale)) solid rgba(83, 212, 255, 0.72);
            padding-top: calc(2.8mm * var(--preview-scale));
            position: relative;
            z-index: 1;
        }

        .name {
            font-size: calc(4.2mm * var(--preview-scale));
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #ffffff;
        }

        .title {
            font-size: calc(2.2mm * var(--preview-scale));
            color: var(--electric-cyan);
            font-weight: 600;
            letter-spacing: 0.15em;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: calc(1.2mm * var(--preview-scale));
            font-size: calc(1.9mm * var(--preview-scale));
            color: #d4dff2;
        }

        .contact-icon {
            width: calc(1.9mm * var(--preview-scale));
            height: calc(1.9mm * var(--preview-scale));
            color: var(--electric-cyan);
            font-weight: bold;
        }

        .website {
            color: var(--electric-cyan);
            font-weight: 600;
        }

        /* Back of card */
        .card-back {
            background: linear-gradient(125deg, var(--matte-black-a) 0%, var(--matte-black-b) 58%, var(--matte-black-c) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-code-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: calc(2.8mm * var(--preview-scale));
            position: relative;
            z-index: 1;
        }

        .qr-code {
            width: calc(23mm * var(--preview-scale));
            height: calc(23mm * var(--preview-scale));
            padding: calc(1.4mm * var(--preview-scale));
            background: white;
            border-radius: calc(0.8mm * var(--preview-scale));
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .qr-label {
            font-size: calc(2mm * var(--preview-scale));
            color: var(--electric-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        .vetra-branding {
            position: absolute;
            bottom: calc(2.2mm * var(--preview-scale));
            right: calc(2.9mm * var(--preview-scale));
            font-size: calc(3.1mm * var(--preview-scale));
            font-weight: 700;
            color: var(--cool-ice);
            letter-spacing: 0.18em;
            opacity: 0.68;
        }

        .back-note {
            font-family: 'Sora', sans-serif;
            font-size: calc(1.75mm * var(--preview-scale));
            text-align: center;
            max-width: 85%;
            color: #d2e8ff;
            line-height: 1.4;
            margin-top: calc(2.2mm * var(--preview-scale));
        }

        /* Print styles for PDF generation */
        @page {
            size: 85.5mm 54mm;
            margin: 0;
        }

        @media print {
            :root {
                --preview-scale: 1;
            }

            body {
                background: white;
                padding: 0;
            }

            .card-container {
                display: block;
                gap: 0;
                max-width: 100%;
                margin: 0;
            }

            .card {
                width: var(--card-width);
                height: var(--card-height);
                page-break-inside: avoid;
                margin: 0;
                border-radius: 0;
                box-shadow: none;
            }
        }

        /* Responsive for screen viewing */
        @media (max-width: 1200px) {
            :root {
                --preview-scale: 1.95;
            }
        }

        @media (max-width: 900px) {
            :root {
                --preview-scale: 1.55;
            }

            .card-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            :root {
                --preview-scale: 1.15;
            }

            .card-container {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- FRONT OF CARD -->
        <div class="card card-front">
            <div class="logo-section">
                <img src="./assets/VETRA.png" alt="Vetra Logo" class="logo">
            </div>

            <div class="guarantee-copy">
                Pays for itself in 1 to 2 shop hours.
                <span class="gradient-words">The 30-Day First-Bay-Filled Guarantee.</span>
            </div>

            <div class="contact-info">
                <div class="name">Avi Patel</div>
                <div class="title">FOUNDER</div>
                <div class="contact-item">
                    <span class="contact-icon">✉</span>
                    sales@apexconversiongroup.com
                </div>
                <div class="contact-item">
                    <span class="contact-icon">☎</span>
                    423-737-4490
                </div>
                <div class="contact-item">
                    <span class="contact-icon">🌐</span>
                    <span class="website">usevetra.com</span>
                </div>
            </div>
        </div>

        <!-- BACK OF CARD -->
        <div class="card card-back">
            <div class="qr-code-section">
                <div class="qr-label">Scan to Learn More</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://usevetra.com/%23home" alt="QR Code" class="qr-code">
                <div class="back-note">Built for high-output shops that want predictable bay fill.</div>
            </div>
            <div class="vetra-branding">VETRA</div>
        </div>
    </div>

    <script>
        // Instructions for printing and PDF generation
        console.log(`
        === VETRA BUSINESS CARD - PRINTING INSTRUCTIONS ===
        
        TO GENERATE PDF FOR PRINTING:
        
        Option 1: Browser Print Function (Recommended for simple PDF)
        - Press Ctrl+P (Windows) or Cmd+P (Mac)
        - Set margins to 0
        - Paper size: Custom (85.5mm x 54mm)
        - Select "Background graphics" in the print settings
        - Save as PDF
        
        Option 2: Using wkhtmltopdf (for CMYK support)
        - Install: brew install wkhtmltopdf (Mac) or apt-get install wkhtmltopdf (Linux)
        - Run: wkhtmltopdf --page-width 85.5mm --page-height 54mm --margin-top 0 --margin-bottom 0 --margin-left 0 --margin-right 0 index.html business-card.pdf
        
        SETUP INSTRUCTIONS:
        1. Copy VETRA.png from ~/Downloads/ to /Website/business-card/assets/ folder
        2. Adjust colors and text as needed
        3. Print on 85.5mm x 54mm cardstock for professional results
        
        CMYK CONVERSION:
        - For true CMYK printing, use a tool like ImageMagick or Ghostscript
        - Or convert the PDF to CMYK using Adobe Acrobat Pro
        - Command: convert business-card.pdf -colorspace CMYK business-card-cmyk.pdf
        `);
    </script>
</body>
</html>
